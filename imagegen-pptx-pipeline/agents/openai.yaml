interface:
  display_name: "ImageGen PPTX Pipeline"
  short_description: "Design general-purpose editable PPTX from reviewed ImageGen slide comps"
  default_prompt: "Use $imagegen-pptx-pipeline to turn my outline, template, data, and references into an editable PPTX, or use reconstruction-only mode when I already provide final per-slide images. For full generation, confirm slide_intent_matrix.md and narrative_matrix.md before ImageGen style options. Recommend concrete style_id choices from references/style-library.md, such as McKinsey-style consulting report, annual report, Apple keynote, Notion, minimalist, classical, technical schematic, or editorial gallery. Let me choose one or multiple visual styles; when multiple styles are selected, generate complete per-slide comp sets in parallel by style lane, but keep each lane serial page-by-page for consistent headers, footers, page numbers, and brand chrome. Save raw ImageGen returns, normalize every accepted comp to uniform 4K, review clarity, then let me choose one or multiple finished style sets for PPTX conversion. For reconstruction-only, skip content/narrative/style generation and register each supplied slide image in reconstruction_manifest.json. Always reconstruct approved images with pixel-locked hybrid fidelity: use each comp as a full-slide or sliced visual backplate, mask text regions, overlay editable PowerPoint text/numbers/simple shapes, process retained icons as padded transparent PNGs, and run at least 9 render/compare/fix rounds before final export."
