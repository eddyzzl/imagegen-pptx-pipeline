interface:
  display_name: "ImageGen PPTX Pipeline"
  short_description: "Design ImageGen decks and convert slide images into faithful editable PPTX"
  default_prompt: "Use $imagegen-pptx-pipeline to turn my outline, template, data, and references into an editable PPTX, or use direct image conversion when I already provide final per-slide images. For full generation, confirm slide_intent_matrix.md and narrative_matrix.md before ImageGen style options. Recommend concrete style_id choices from references/style-library.md, let me choose one or multiple visual styles, then generate complete per-slide comp sets serially within each style lane. After every generated per-slide comp, dispatch bounded reviewer subagents and write approved qa/reviews/slide-comp/slide-XXX.json evidence for all required content, text, visual, style, asset, accessibility, and PPTX-feasibility roles before conversion. For PPTX conversion, copy slidelib.py, iconcut3.py, qa_gate.py, PITFALLS.md, and scripts/realesrgan_upscale.py into the workspace, process every comp with Python RealESRGANer + RealESRGAN_x4plus.pth + CPU + tile=400 to exact 3840x2160 and record upscale_manifest_path, lock conversion_manifest.json, measure every Real-ESRGAN comp in 1920x1080 basis coordinates, extract icons with strict ClipError handling, upscale extracted icons with the same Python RealESRGANer CPU/tile path into icons/upscaled before placement, run contact-sheet audit, build native editable slides with slidelib.py, run at least 10 render-compare-fix rounds where each round has a distinct exported render file, and run qa_gate.py all before final export."
