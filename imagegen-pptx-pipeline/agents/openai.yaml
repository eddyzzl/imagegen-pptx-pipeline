interface:
  display_name: "ImageGen PPTX Pipeline"
  short_description: "Design general-purpose editable PPTX from reviewed ImageGen slide comps"
  default_prompt: "Use $imagegen-pptx-pipeline to turn my outline, template, data, and references into an editable PPTX for a product, company, model/technical, sales, strategy, investor, training, or internal-review deck. Select the deck profile, apply the built-in PPT taste system from references/taste-system.md, lock content in deck_spec.json, show me slide_intent_matrix.md first so I can confirm each page's title/core idea/proof goal/evidence strategy, then show me narrative_matrix.md with multiple narrative treatments before ImageGen, lock my selected narrative in narrative_plan.json, ask and resume from pipeline_state.json when content/slide-intent/narrative/style choices need confirmation, generate materially different ImageGen style lanes without changing the selected story, let me choose one, review each real slide comp under slides/slide-XXX-comp.png, run the gate checker, then reconstruct the approved images as editable PowerPoint slides with the template preserved."
