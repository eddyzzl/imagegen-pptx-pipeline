interface:
  display_name: "ImageGen PPTX Pipeline"
  short_description: "Design general-purpose editable PPTX from reviewed ImageGen slide comps"
  default_prompt: "Use $imagegen-pptx-pipeline to turn my outline, template, data, and references into an editable PPTX, or use reconstruction-only mode when I already provide final per-slide images. For full generation, confirm slide_intent_matrix.md and narrative_matrix.md before ImageGen style options. For reconstruction-only, skip content/narrative/style generation, register each supplied slide image in reconstruction_manifest.json, build each page as slide-modules/slide-XXX.pptx, review the rendered preview against the source image, then merge approved modules. Always reconstruct approved images with pixel-locked hybrid fidelity: use each comp as a full-slide or sliced visual backplate, mask text regions, and overlay editable PowerPoint text/numbers/simple shapes while preserving the template."
