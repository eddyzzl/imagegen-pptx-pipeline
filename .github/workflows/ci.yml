name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-tests:
    name: Smoke tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy Pillow python-pptx defusedxml

      - name: Compile Python files
        run: |
          python -m py_compile \
            imagegen-pptx-pipeline/iconcut3.py \
            imagegen-pptx-pipeline/qa_gate.py \
            imagegen-pptx-pipeline/slidelib.py \
            imagegen-pptx-pipeline/scripts/check_imagegen_comp_asset.py \
            imagegen-pptx-pipeline/scripts/check_pipeline_gates.py \
            imagegen-pptx-pipeline/scripts/init_pipeline_workspace.py \
            imagegen-pptx-pipeline/scripts/normalize_slide_comp.py \
            tests/test_pipeline_smoke.py

      - name: Run smoke tests
        run: python -m unittest discover -s tests
